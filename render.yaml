services:
  - type: web
    name: beatwave-api
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beatwave-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: HUBTEL_CLIENT_ID
        sync: false
      - key: HUBTEL_CLIENT_SECRET
        sync: false

  - type: pserv
    name: beatwave-db
    runtime: postgresql
    ipAllowList: []